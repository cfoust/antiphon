name: site

# Build the marketing site (Vite, at /) + docs (Docusaurus, at /docs/) into one
# GitHub Pages artifact. The web demo's wasm engine is built from source, so the
# deployed demo always matches the committed DSP.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2

      - name: Build wasm engine + stage assets
        run: bash tools/build-web.sh

      - name: Build marketing site + demo
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build docs
        working-directory: docs-site
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/docs
          cp -r web/dist/* _site/
          cp -r docs-site/build/* _site/docs/
          echo antiphon.dev > _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
