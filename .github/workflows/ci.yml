name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Rust tests
        run: cargo test --release

      - name: Parity gate (native vs wasm, < -90 dBFS)
        run: |
          cargo run -p antiphon-render --release -q -- parity
          cargo build -p antiphon-ffi --release --target wasm32-unknown-unknown
          node tools/parity.mjs

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: antiphond/go.sum
      - name: Daemon tests
        working-directory: antiphond
        run: go test ./...
