<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chamber — renderer test harness</title>
<style>
  :root { color-scheme: dark; }
  body { font: 13px/1.5 -apple-system, system-ui, sans-serif; margin: 0; background: #0b0d12; color: #e8e8ea; }
  header { padding: 10px 16px; border-bottom: 1px solid #1d2230; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  .wrap { display: flex; gap: 16px; padding: 16px; flex-wrap: wrap; }
  canvas { background: #11141c; border-radius: 10px; border: 1px solid #1d2230; touch-action: none; }
  .panel { width: 280px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: #11141c; border: 1px solid #1d2230; border-radius: 10px; padding: 12px; }
  label { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin: 4px 0; }
  input[type=range] { width: 150px; }
  select, button { font: inherit; background: #1a1f2b; color: #e8e8ea; border: 1px solid #2a3142; border-radius: 7px; padding: 6px 10px; cursor: pointer; }
  button.primary { background: #2d6cdf; border-color: #2d6cdf; }
  .src-row { display: flex; gap: 6px; align-items: center; padding: 4px 0; border-bottom: 1px solid #1a1f2b; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; flex: none; }
  .hint { color: #7c8499; font-size: 12px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #dev3d { display: none; }
</style>
</head>
<body>
<header>
  <h1>Chamber · renderer test harness</h1>
  <button id="start" class="primary">Start audio</button>
  <span id="status" class="hint">idle</span>
  <span class="hint">headphones · click the map to add a source · drag to move</span>
</header>

<div class="wrap">
  <div>
    <canvas id="map" width="460" height="460"></canvas>
    <canvas id="dev3d" width="460" height="240"></canvas>
  </div>

  <div class="panel">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <strong>Listener</strong><span id="orientVal" class="hint">0°</span>
      </div>
      <label>Head yaw <input id="orient" type="range" min="-180" max="180" value="0" /></label>
      <label>Height (y) <input id="lisY" type="range" min="-2" max="2" step="0.05" value="0" /></label>
      <label>Room
        <select id="room"></select>
      </label>
      <label>Reflections <input id="refl" type="checkbox" checked /></label>
      <label>Master <input id="master" type="range" min="0" max="1.5" step="0.01" value="0.9" /></label>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <strong>Add source</strong>
      </div>
      <label>Sound
        <select id="sfx"></select>
      </label>
      <div class="row">
        <button id="add" class="primary">Add at front</button>
        <button id="addFile">Load file…</button>
        <input id="file" type="file" accept="audio/*" hidden />
      </div>
      <div class="hint">Or click anywhere on the map.</div>
    </div>

    <div class="card">
      <strong>Sources</strong>
      <div id="sources"></div>
    </div>
  </div>
</div>

<script type="module" src="/src/test.ts"></script>
</body>
</html>
