<!doctype html>
<!--
  attention-demo — hears the REAL engine "an agent is waiting" cue (chamber-dsp AttentionCue),
  driven through the wasm renderer. Set the number of waiting agents and watch/hear it build.
     just attention-demo   (from web/)   -> http://localhost:5174/attention-demo.html
  Headphones required. NOTE: the build is slow by design — use a short "build time" to hear it.
-->
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>attention cue · engine demo</title>
<style>
  body { margin:0; background:#0e1013; color:#e7ebf0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .box { max-width:560px; margin:6vh auto; padding:28px; background:#171a1f; border:1px solid #262b33; border-radius:16px; }
  h1 { font-size:18px; margin:0 0 4px; } p.sub { color:#8b93a1; margin:0 0 22px; font-size:13px; }
  button { background:#20252d; color:#e7ebf0; border:1px solid #262b33; border-radius:9px; padding:10px 16px; font-size:14px; cursor:pointer; }
  button.primary { background:#7fd1c4; color:#06231f; border-color:#7fd1c4; font-weight:650; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .agents { display:flex; align-items:center; gap:16px; margin:22px 0; }
  .count { font-size:44px; font-variant-numeric:tabular-nums; min-width:60px; text-align:center; color:#7fd1c4; }
  .agents button { width:52px; height:52px; font-size:24px; border-radius:12px; }
  .row { margin:18px 0; } label { display:flex; justify-content:space-between; }
  .val { color:#7fd1c4; } input[type=range] { width:100%; accent-color:#7fd1c4; margin-top:8px; }
  .status { color:#8b93a1; font-size:13px; margin-top:18px; }
  .status b { color:#7fd1c4; }
  .bar { height:6px; background:#0b0e11; border-radius:4px; overflow:hidden; margin-top:6px; }
  .bar > i { display:block; height:100%; width:0; background:#7fd1c4; transition:width .2s; }
</style>
</head>
<body>
<div class="box">
  <h1>“An agent is waiting” — engine cue</h1>
  <p class="sub">🎧 The real <code>chamber-dsp</code> cue: a minor-7th bloom at a random ear that builds louder &amp; faster the longer agents wait. Voices per pulse = agents.</p>
  <button id="start" class="primary">▶ Start audio</button>

  <div class="agents" style="opacity:.4; pointer-events:none;" id="panel">
    <button id="minus">−</button>
    <div class="count" id="count">0</div>
    <button id="plus">+</button>
    <div style="color:#8b93a1;font-size:13px;">waiting<br>agents</div>
  </div>

  <div class="row" id="buildrow" style="opacity:.4; pointer-events:none;">
    <label><span>Build time (silent → full urgency)</span><span class="val" id="bmval">0.5 min</span></label>
    <input type="range" id="bm" min="0.1" max="10" step="0.1" value="0.5" />
    <div style="color:#8b93a1;font-size:12px;margin-top:4px;">Real default is 10 min. Short values let you hear it build quickly.</div>
  </div>

  <div class="status" id="status">idle · press Start (headphones on)</div>
  <div class="bar" title="urgency (elapsed / build time)"><i id="urg"></i></div>
</div>

<script type="module">
const SR = 48000;
let node, ready=false, agents=0, buildMin=0.5, startedAt=null;

async function start(){
  const [wasm, asset] = await Promise.all([
    fetch("/chamber_ffi.wasm").then(r=>r.arrayBuffer()),
    fetch("/chamber.chamber").then(r=>r.arrayBuffer()),
  ]);
  const ctx = new AudioContext({sampleRate:SR});
  await ctx.audioWorklet.addModule("/chamber-worklet.js");
  node = new AudioWorkletNode(ctx,"chamber",{numberOfInputs:0,numberOfOutputs:1,outputChannelCount:[2],processorOptions:{maxSources:4}});
  node.connect(ctx.destination);
  node.port.onmessage = e=>{ if(e.data.type==="ready"){ ready=true; onReady(ctx); } };
  node.port.postMessage({type:"init", wasm, asset});
  await ctx.resume();
}
function onReady(ctx){
  node.port.postMessage({type:"master", gain:0.9});
  node.port.postMessage({type:"room", index:4});            // room_conv (BRIR), matches the app default
  node.port.postMessage({type:"attnBuild", minutes:buildMin});
  document.getElementById("start").disabled=true;
  for(const id of ["panel","buildrow"]){ const el=document.getElementById(id); el.style.opacity=1; el.style.pointerEvents="auto"; }
  setStatus(`<b>ready</b> · ${ctx.sampleRate} Hz · set agents &gt; 0 to start the clock`);
}
function setAgents(n){
  agents=Math.max(0,Math.min(8,n));
  document.getElementById("count").textContent=agents;
  if(ready) node.port.postMessage({type:"attnAgents", n:agents});
  startedAt = agents>0 ? (startedAt ?? performance.now()) : null;
  if(agents===0) document.getElementById("urg").style.width="0%";
}
function setStatus(h){ document.getElementById("status").innerHTML=h; }

document.getElementById("start").addEventListener("click", ()=>start().catch(e=>setStatus("error: "+e.message)));
document.getElementById("plus").addEventListener("click", ()=>setAgents(agents+1));
document.getElementById("minus").addEventListener("click", ()=>setAgents(agents-1));
const bm=document.getElementById("bm");
bm.addEventListener("input", ()=>{ buildMin=parseFloat(bm.value); document.getElementById("bmval").textContent=buildMin.toFixed(1)+" min"; if(ready) node.port.postMessage({type:"attnBuild", minutes:buildMin}); startedAt=agents>0?performance.now():null; });

// urgency meter (mirrors the core's elapsed/build clock; visual only)
function tick(){
  if(startedAt!=null){
    const u=Math.min(1,(performance.now()-startedAt)/1000/(buildMin*60));
    document.getElementById("urg").style.width=(u*100).toFixed(0)+"%";
    setStatus(`<b>${agents}</b> agent(s) waiting · urgency ${(u*100|0)}% · louder + faster as it climbs`);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
